services:
  - type: web
    name: slotly-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run server:build
    startCommand: SERVE_STATIC=false npm run server:start
    autoDeploy: true
    healthCheckPath: /api/centers
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: CORS_ORIGIN
        value: https://your-frontend-domain.vercel.app
      - key: SERVE_STATIC
        value: "false"
